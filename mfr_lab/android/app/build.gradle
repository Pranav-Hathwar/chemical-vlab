plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) flutterVersionCode = '1'

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) flutterVersionName = '1.0.0'

android {
    namespace "com.mfrlab.mfr_lab"
    compileSdk 36
    ndkVersion "28.2.13676358"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.mfrlab.mfr_lab"
        // Google Sign-In requires 21+; multiDex covers the auth/dio plugin set.
        minSdkVersion flutter.minSdkVersion
        targetSdk 34
        multiDexEnabled true
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            // TODO(release): replace debug signing with a real release keystore.
            signingConfig signingConfigs.debug
        }
    }
}

// ADD YOUR SHA-1 TO GOOGLE CLOUD CONSOLE BEFORE RELEASE
//   Get it with:  ./gradlew signingReport   (or keytool -list -v -keystore <ks>)
//   Then add the SHA-1 to your Google OAuth Android client in Google Cloud Console
//   so Google Sign-In works on release builds.

flutter {
    source '../..'
}

name: mfr_lab
description: MFR Virtual Lab — A virtual laboratory tool for Chemical Engineering students to determine reactor rate constants.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  fl_chart: ^0.68.0
  excel: ^4.0.6
  path_provider: ^2.1.2
  share_plus: ^9.0.0
  intl: ^0.19.0
  universal_html: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
